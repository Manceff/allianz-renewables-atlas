#
# Périmètre : equity direct (Sponsor Equity) ou propriété majoritaire identifiée.
# Hors périmètre : éolien, batteries, hydro, transmission, fonds infrastructure tiers
# où les actifs sous-jacents ne sont pas nommés.
#
# Schéma par parc :
#   id: slug-unique
#   name: nom canonique
#   country: code ISO 3166-1 alpha-2
#   technology: solar (toujours, dans cette V1 solar-only)
#   coordinates: [lat, lon]
#   capacity_mwp: float (MWp)
#   commissioning_year: int
#   operator: nom du développeur / opérateur partenaire
#   allianz_stake_pct: float (null si non public)
#   acquisition_year: int
#   press_release_url: URL canonique
#   notes: contexte deal
#   has_pvgis_estimate: bool
#   has_reported_production: bool

