# Master index des parcs SOLAIRES PV d'Allianz Capital Partners (ACP / AllianzGI Infrastructure)
# publiquement identifiables, période 2010-2026.
#
# Périmètre : equity direct (Sponsor Equity) ou propriété majoritaire identifiée.
# Hors périmètre : éolien, batteries, hydro, transmission, fonds infrastructure tiers
# où les actifs sous-jacents ne sont pas nommés.
#
# Schéma par parc :
#   id: slug-unique
#   name: nom canonique
#   country: code ISO 3166-1 alpha-2
#   technology: solar (toujours, dans cette V1 solar-only)
#   coordinates: [lat, lon]
#   capacity_mwp: float (MWp)
#   commissioning_year: int
#   operator: nom du développeur / opérateur partenaire
#   allianz_stake_pct: float (null si non public)
#   acquisition_year: int
#   press_release_url: URL canonique
#   notes: contexte deal
#   has_pvgis_estimate: bool
#   has_reported_production: bool

parks:
  # === ITALIE — Marché historique 2010-2013 ===
  # Note : Project Brindisi Portfolio (premier solar deal ACP 2010, 7.2 MWp)
  # retiré de l'atlas en V26 — divested à date inconnue pré-2024 ;
  # détenu par Bluefield Revive Italia I Srl depuis jan 2024.

  - id: manzano-solar
    name: "Manzano Solar Park"
    country: IT
    technology: solar
    coordinates: [45.9645, 13.3728]  # Manzano, Udine, Friuli-VG. Source OSM way 1304106680 (IBC Solar website tag confirmé, 11 MWp) https://www.openstreetmap.org/way/1304106680
    capacity_mwp: 11.2
    commissioning_year: 2010
    operator: "IBC Solar (EPC + O&M)"
    allianz_stake_pct: 100
    acquisition_year: 2010
    press_release_url: "https://www.pv-tech.org/ibc_solar_sells_11-2mw_italian_park_to_allianz_specialised_investments/"
    notes: "Grid-connected 7 déc 2010, acquis par Allianz Specialised Investments. 47 000 modules polycrystalline + 3 600 thin-film sur 32 ha, Manzano (Udine, Frioul-VG). ~13 GWh/an. Premier utility-scale ACP en Italie. Sous Conto Energia II — revenue locked-in jusqu'à déc 2030, wholesale spot non pertinent."
    fit_strike_price_eur_mwh: 318.0
    fit_scheme: "Conto Energia II (DM 19/02/2007) — base €0.346/kWh non-integrated >20 kW H2-2010 vintage, post Spalma-Incentivi 2015 Option C (-8% pour P>900 kW)"
    fit_expiry_year: 2030
    has_pvgis_estimate: true
    has_reported_production: true

  - id: sisen-foggia
    name: "Centrale photovoltaïque SiSen"
    country: IT
    technology: solar
    coordinates: [41.5604, 15.6922]  # San Giovanni Rotondo, Foggia, Pouilles. Source GEM Wiki (exact) https://www.gem.wiki/SiSen_solar_project
    capacity_mwp: 8
    commissioning_year: 2011
    operator: "Allianz Renewable Energy Fund I (AREF I)"
    allianz_stake_pct: 100
    acquisition_year: 2013
    press_release_url: "https://www.infrappp.com/news/allianz-acquires-italian-photovoltaic-plant"
    notes: "Acquis via le premier fonds AREF I entre fin 2012 et mi-2013. Foggia, Pouilles. Acquisition emblématique du modèle ACP : risque réglementaire italien (décret Spalma-Incentivi) intégré dans la valorisation. ~12 280 MWh/an, alimente 3 000 foyers. Sous Conto Energia III (vintage 2011) — revenue locked-in jusqu'à ~2031. INCOHÉRENCE DATA : InfraPPP indique 8 MWp / acquisition 2013 ; GEM Wiki indique 10.6 MWac / COD 2017 — possible extension/repowering Phase 2. À vérifier via GSE Atlaimpianti."
    fit_strike_price_eur_mwh: 250.0
    fit_scheme: "Conto Energia III (DM 06/08/2010) — estimation €0.272/kWh range vintage 2011 H1, post Spalma-Incentivi 2015 Option C (-8% pour P>900 kW). Valeur conservative ; à affiner via GSE Atlaimpianti."
    fit_expiry_year: 2031
    has_pvgis_estimate: true
    has_reported_production: true

  # === PORTUGAL — Première vague subsidy-free 2018 ===

  - id: ourika
    name: "Central Solar Fotovoltaica Ourika"
    country: PT
    technology: solar
    coordinates: [37.6560, -8.1990]  # Ourique, Beja, Alentejo. Source OSM "Central Solar da Herdade do Quintal" 50 MW (nom local du parc, polygon exact)
    capacity_mwp: 46.1
    commissioning_year: 2018
    operator: "WElink Energy / China Triumph International Engineering"
    allianz_stake_pct: 100
    acquisition_year: 2018
    press_release_url: "https://www.allianzcapitalpartners.com/media/news/102518-allianz-acquires-first-subsidy-free-solar-project-iberia/"
    notes: "JALON HISTORIQUE : premier parc solaire de grande envergure subsidy-free en péninsule ibérique. 142 000 panneaux sur 100 ha. PPA corporate 20 ans à prix fixe. ~80 GWh/an, 23 000 foyers."
    has_pvgis_estimate: true
    has_reported_production: true

  - id: solara-4
    name: "Solara 4 (Central Fotovoltaica Alcoutim)"
    country: PT
    technology: solar
    coordinates: [37.3947, -7.7043]  # Vaqueiros, Alcoutim, Algarve. Source OSM "Central Fotovoltaica Riccardo Totta" 220 MW (exact polygon)
    capacity_mwp: 219
    commissioning_year: 2021  # construit 2019-2020, inauguré oct 2021
    operator: "WElink Energy / On Top of Renewable (engineering)"
    allianz_stake_pct: 0  # accord Allianz × WElink échoué — Allianz n'a finalement PAS acquis cet actif
    acquisition_year: null
    press_release_url: "https://www.aplitop.com/utilizadores-detalhe.aspx?u=88&l=fr"
    notes: "Méga-projet 800 ha, 661 500 panneaux, renommé Riccardo Totta PV Plant à l'inauguration. Construit 2019-2020 par WElink + Onrenewables (Valence/Marbella/Tokyo), 800+ employés sur le chantier. Conçu pour ~100 000 foyers. INCLUS DANS L'ATLAS POUR CONTEXTE STRATÉGIE ACP IBÉRIQUE (Allianz détient effectivement la centrale-soeur Ourika 46 MWp, à ~80 km à Ourique/Beja) — bien que le deal Allianz × WElink pour Solara 4 ait échoué selon la presse portugaise (interview Hugo Paz : « Non. Nous avons l'intention de continuer à faire fonctionner le projet de la meilleure façon possible »)."
    divested: true
    divestment_label: "DEAL DID NOT CLOSE — included for portfolio context"
    divestment_note: "Allianz × WElink Solara 4 acquisition fell through. Hugo Paz (WElink) confirmed in press interview that the deal failed and WElink would continue operating the asset itself. Allianz did successfully acquire the sister plant Ourika (46 MWp, ~80 km north in Ourique/Beja) — included here for context on ACP's Iberian strategy."
    has_pvgis_estimate: true
    has_reported_production: true

