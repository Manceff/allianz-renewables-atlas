name: Refresh Renewables Atlas data

on:
  schedule:
    # Lundi 06:00 UTC — tous les lundis matin
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest (sanity)
        run: pytest tests/ -q

      - name: Precompute parcs (Sentinel + PVGIS + delta)
        env:
          COPERNICUS_USERNAME: ${{ secrets.COPERNICUS_USERNAME }}
          COPERNICUS_PASSWORD: ${{ secrets.COPERNICUS_PASSWORD }}
        run: python scripts/precompute_all.py

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/parks/ data/PRECOMPUTE_FAILURES.md 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Aucun changement à committer."
          else
            git commit -m "chore(data): hebdo refresh $(date -u +%Y-%m-%d)"
            git push
          fi
