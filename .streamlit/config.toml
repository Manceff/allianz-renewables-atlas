[theme]
# JARVIS / Tesla console / Apple Vision Pro vibe — dark + cyan calme
base = "dark"
primaryColor = "#7dd3fc"
backgroundColor = "#0a0e1a"
secondaryBackgroundColor = "#141b2e"
